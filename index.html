<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwimGenius — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div id="login-screen">
    <div class="login-wrap">

      <div class="logo-row">
        <div class="logo-mark">🏊</div>
        <div class="logo-name">Swim<span>Genius</span></div>
      </div>

      <div class="login-card">
        <div class="card-heading">Welcome back</div>
        <div class="card-sub">Sign in to your coaching dashboard</div>

        <div class="tabs">
          <button class="tab-btn active" onclick="setTab('login', this)">Sign in</button>
          <button class="tab-btn" onclick="setTab('register', this)">Register</button>
        </div>

        <!-- LOGIN TAB -->
        <div id="tab-login">
          <div class="field">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@example.com">
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
          </div>
          <div id="login-error" class="error-msg" style="display:none;"></div>
          <button class="btn-primary" onclick="handleLogin()">Sign in</button>
        </div>

        <!-- REGISTER TAB -->
        <div id="tab-register" style="display:none;">
          <div class="field">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="Alex Johnson">
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com">
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Choose a password">
          </div>
          <div id="reg-error" class="error-msg" style="display:none;"></div>
          <button class="btn-primary" onclick="handleRegister()">Create account</button>
        </div>

        <div class="demo-row">
          <span>Just exploring?</span>
          <button onclick="handleDemo()">Use demo account</button>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
